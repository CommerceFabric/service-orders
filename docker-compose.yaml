version: "5.1.4"

services:
  ordersservice:
    image: danielmusselwhite/commercefabric_order_microservice:1.0.0
    container_name: ordersservice
    build:
      context: .
      dockerfile: OrdersMicroservice.API/Dockerfile
    ports:
      - "7070:8080"
    networks:
      - commercefabric-network
    depends_on:
      - mongodb-orderservice

  mongodb-orderservice:
    image: mongo:latest
    container_name: mongodb-orderservice
    ports:
      - "27017:27017"
    volumes:
      - ./Resources/docker/mongodb-init:/docker-entrypoint-initdb.d:ro
    networks:
      - commercefabric-network
    restart: unless-stopped

    # Pull the other microservices this depends on from dockerhub, so that they can be used for testing the Orders microservice
  postgressql-userservice:
    image: postgres:18.0
    container_name: postgressql-userservice
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: userService
    ports:
      - "5432:5432"
    volumes:
      - ./Resources/docker/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - commercefabric-network
    restart: unless-stopped

  userservice:
    image: danielmusselwhite/commercefabric_user_microservice:${USER_VERSION}
    container_name: userservice
    ports:
      - "9090:8080"
    networks:
      - commercefabric-network
    depends_on:
      - postgressql-userservice
    restart: unless-stopped

  mysql-productservice:
    image: mysql:9.7.1
    container_name: mysql-productservice
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: productService
    ports:
      - "3306:3306"
    volumes:
      - ./Resources/docker/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - commercefabric-network
    restart: unless-stopped

  productservice:
    image: danielmusselwhite/commercefabric_product_microservice:${PRODUCT_VERSION}
    container_name: productservice
    ports:
      - "8080:8080"
    networks:
      - commercefabric-network
    depends_on:
      - mysql-productservice
    restart: unless-stopped